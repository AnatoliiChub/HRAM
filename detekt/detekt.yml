config:
  validation: false

build:
  maxIssues: 0
  weights:
    complexity: 2
    LongParameterList: 1
    style: 1

complexity:
  active: true
  CyclomaticComplexMethod:
    active: true
    threshold: 15
  LongMethod:
    active: true
    threshold: 120
    ignoreAnnotated: [ 'Composable' ]
  LongParameterList:
    active: true
    functionThreshold: 12
    constructorThreshold: 12
    ignoreDefaultParameters: true
    ignoreAnnotated: [ 'Composable' ]
  LargeClass:
    active: true
    threshold: 600
  TooManyFunctions:
    active: true
    thresholdInClasses: 30
    thresholdInInterfaces: 20
    thresholdInFiles: 40
  NestedBlockDepth:
    active: true
    threshold: 4

naming:
  active: true
  FunctionNaming:
    active: true
    # Allows PascalCase for Composable functions that return Unit (UI components)
    functionPattern: '([a-z][a-zA-Z0-9]*)|([A-Z][a-zA-Z0-9]*)'
    excludeClassPattern: '$^'
    ignoreAnnotated: [ 'Composable' ]
  ClassNaming:
    active: true
    classPattern: '[A-Z][a-zA-Z0-9]*'
  VariableNaming:
    active: true
    variablePattern: '[a-z][a-zA-Z0-9]*'
  PackageNaming:
    active: true
    packagePattern: '[a-z]+(\.[a-z][A-Za-z0-9]*)*'
  MatchingDeclarationName:
    active: false

style:
  active: true
  MagicNumber:
    active: true
    ignorePropertyDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
    ignoreAnnotation: true
    ignoreEnums: true
    ignoreNumbers: [ '-1', '0', '1', '2' ]
  UnusedPrivateMember:
    active: true
    ignoreAnnotated: [ 'Preview' ]
  UnusedImports:
    active: true
  WildcardImport:
    active: true
  NewLineAtEndOfFile:
    active: true
  ReturnCount:
    active: true
    max: 3
  ModifierOrder:
    active: true
  DestructuringDeclarationWithTooManyEntries:
    active: true
    maxDestructuringEntries: 4

potential-bugs:
  active: true
  EqualsAlwaysReturnsTrueOrFalse:
    active: true
  UnsafeCallOnNullableType:
    active: true
  LateinitUsage:
    active: true
    ignoreAnnotated: [ 'InjectedParam', 'Provided' ]
  AvoidReferentialEquality:
    active: true

performance:
  active: true
  SpreadOperator:
    active: true

empty-blocks:
  active: true
  EmptyCatchBlock:
    active: true
  EmptyFunctionBlock:
    active: true
    ignoreOverridden: true

exceptions:
  active: true
  TooGenericExceptionCaught:
    active: true
    exceptionNames:
      - Error
      - RuntimeException
      - Throwable
