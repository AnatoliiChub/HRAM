name: Pull Request
run-name: Running pre-merge pull request tasks

on:
  pull_request:
    branches:
      - main

# Cancel in-progress runs of the same workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Static code analysis
  detekt:
    name: Static Code Analysis
    uses: ./.github/workflows/detekt-analysis.yml

  # Unit tests and coverage
  unit-tests:
    name: Unit Tests & Coverage
    uses: ./.github/workflows/unit-tests.yml
    permissions:
      contents: read
      pull-requests: write

  # Android debug build
  android-build:
    name: Android Build
    needs: [ detekt ]
    uses: ./.github/workflows/android-build.yml

  # iOS debug build
  ios-build:
    name: iOS Build
    needs: [ detekt ]
    uses: ./.github/workflows/ios-build.yml

  # macOS DMG build
  mac-build:
    name: macOS Build
    needs: [ detekt ]
    uses: ./.github/workflows/mac-build.yml

  # Summary comment on PR
  summary:
    name: Post PR Summary
    needs: [ detekt, unit-tests, android-build, ios-build, mac-build ]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    if: always()

    steps:
      - name: Generate PR summary comment
        uses: mshick/add-pr-comment@v2
        with:
          message: |
            ## 🚀 Pull Request Build Summary
            
            All pre-merge checks have completed. Review the results below:
            
            ### 📊 Reports & Artifacts
            
            | Check | Status | Artifact |
            |-------|--------|----------|
            | 🔍 Detekt Analysis | ${{ needs.detekt.result == 'success' && '✅ Passed' || '❌ Failed' }} | [View Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${{ needs.detekt.outputs.artifact-id }}) |
            | 🧪 Unit Tests & Coverage | ${{ needs.unit-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} | [View Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${{ needs.unit-tests.outputs.artifact-id }}) |
            | 🤖 Android Debug Build | ${{ needs.android-build.result == 'success' && '✅ Passed' || '❌ Failed' }} | [Download APK](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${{ needs.android-build.outputs.artifact-id }}) |
            | 🍎 iOS Debug Build | ${{ needs.ios-build.result == 'success' && '✅ Passed' || '❌ Failed' }} | [Download App](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${{ needs.ios-build.outputs.artifact-id }}) |
            | 🖥️ macOS DMG | ${{ needs.mac-build.result == 'success' && '✅ Passed' || '❌ Failed' }} | [Download DMG](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${{ needs.mac-build.outputs.artifact-id }}) |
            
            ---
            *Workflow run: [#${{ github.run_number }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})*
