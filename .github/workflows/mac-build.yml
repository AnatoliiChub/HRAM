name: macOS Build
run-name: Building macOS DMG

on:
  workflow_call:
    outputs:
      artifact-id:
        description: "The artifact ID of the macOS DMG"
        value: ${{ jobs.mac-build.outputs.artifact-id }}

jobs:
  mac-build:
    name: Build macOS DMG
    runs-on: macos-26
    outputs:
      artifact-id: ${{ steps.artifact-upload-step.outputs.artifact-id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Package macOS DMG
        run: |
          ./gradlew clean :desktopApp:packageDmg \
            --no-daemon \
            --stacktrace

      - name: Upload macOS DMG
        if: always()
        uses: actions/upload-artifact@v4
        id: artifact-upload-step
        with:
          name: macos-dmg
          path: desktopApp/build/compose/binaries/main/dmg/*.dmg
          if-no-files-found: warn
          retention-days: 7
